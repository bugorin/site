<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grupo de Promoções no WhatsApp</title>
    <meta
      name="description"
      content="Receba promoções e cupons no WhatsApp e economize nas suas compras online."
    />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Grupo de Promoções no WhatsApp" />
    <meta
      property="og:description"
      content="As melhores promoções e cupons para você economizar até 80% nas compras online."
    />
    <meta property="og:url" content="https://bugorin.github.io/site/" />
    <meta
      property="og:image"
      content="https://bugorin.github.io/site/thumbnail-social.png"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="pt_BR" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Grupo de Promoções no WhatsApp" />
    <meta
      name="twitter:description"
      content="As melhores promoções e cupons para você economizar até 80% nas compras online."
    />
    <meta
      name="twitter:image"
      content="https://bugorin.github.io/site/thumbnail-social.png"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,700&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="page-frame" aria-label="Convite para grupo de promoções">
        <article class="hero-card reveal">
          <div class="hero-glow" aria-hidden="true"></div>

          <header class="hero-header">
            <div class="hero-avatar-wrap">
              <img
                class="hero-avatar"
                src="avatar-promocoes.png"
                alt="Mulher sorrindo com sacolas de compras"
              />
            </div>

            <h1 class="hero-title">
              As melhores promoções e cupons para você economizar
              <em>até 60%</em> nas compras online.
            </h1>

            <p class="hero-copy">
              Todos os dias, enviamos cupons direto no seu WhatsApp.
            </p>
          </header>

          <div class="hero-actions">
            <a
              class="cta-button"
              id="whatsappButton"
              href="#"
              target="_blank"
              rel="noopener noreferrer"
            >
              <span class="cta-icon" aria-hidden="true">
                <svg viewBox="0 0 32 32" role="img" focusable="false">
                  <path
                    d="M27.2 4.8A15.5 15.5 0 0 0 3.8 24.2L2 30l6-1.7A15.5 15.5 0 1 0 27.2 4.8Zm-11.2 24a12.7 12.7 0 0 1-6.5-1.8l-.4-.2-3.6 1 1-3.5-.2-.4a12.8 12.8 0 1 1 9.7 4.9Zm7-9.5c-.4-.2-2.5-1.2-2.8-1.3-.4-.1-.7-.2-1 .2s-1.1 1.3-1.3 1.5-.5.3-.9.1a10.4 10.4 0 0 1-3.1-1.9 11.4 11.4 0 0 1-2.2-2.7c-.2-.4 0-.6.2-.8.2-.2.4-.5.6-.7.2-.2.2-.4.4-.7.1-.2 0-.5 0-.7 0-.2-1-2.4-1.4-3.3-.3-.8-.7-.7-1-.7h-.8c-.3 0-.7.1-1 .5s-1.5 1.5-1.5 3.7 1.6 4.3 1.8 4.6c.2.3 3.2 4.8 7.8 6.8 1.1.5 2 .8 2.7 1 .1 0 .3.1.4.1 1.1.3 2.2.3 3 .2.9-.1 2.5-1 2.9-1.9.4-1 .4-1.8.3-2-.1-.2-.4-.3-.8-.5Z"
                    fill="currentColor"
                  />
                </svg>
              </span>
              <span>Quero entrar agora, é grátis</span>
            </a>

            <section class="brand-marquee" aria-label="Lojas com promoções">
              <div class="brand-marquee__viewport">
                <div class="brand-marquee__track">
                  <div class="brand-chip brand-chip--shopee">
                    <img src="assets/shopee.svg" alt="Shopee" class="brand-chip__image" />
                  </div>
                  <div class="brand-chip brand-chip--amazon">
                    <img src="assets/amazon.svg" alt="Amazon" class="brand-chip__image" />
                  </div>
                  <div class="brand-chip brand-chip--magalu">
                    <img src="assets/magalu.svg" alt="Magalu" class="brand-chip__image" />
                  </div>
                  <div class="brand-chip brand-chip--meli">
                    <img
                      src="assets/mercado-livre.webp"
                      alt="Mercado Livre"
                      class="brand-chip__image brand-chip__image--meli"
                    />
                  </div>

                  <div class="brand-chip brand-chip--shopee" aria-hidden="true">
                    <img src="assets/shopee.svg" alt="" class="brand-chip__image" />
                  </div>
                  <div class="brand-chip brand-chip--amazon" aria-hidden="true">
                    <img src="assets/amazon.svg" alt="" class="brand-chip__image" />
                  </div>
                  <div class="brand-chip brand-chip--magalu" aria-hidden="true">
                    <img src="assets/magalu.svg" alt="" class="brand-chip__image" />
                  </div>
                  <div class="brand-chip brand-chip--meli" aria-hidden="true">
                    <img
                      src="assets/mercado-livre.webp"
                      alt=""
                      class="brand-chip__image brand-chip__image--meli"
                    />
                  </div>
                </div>
              </div>
            </section>

            <p class="benefits-line">
              ✓ Grátis • ✓ Silencioso • ✓ Sem spam • ✓ Sair quando quiser
            </p>
          </div>
        </article>
      </section>

      <aside
        class="join-toast"
        id="joinToast"
        aria-live="polite"
        aria-atomic="true"
      >
        <div class="toast-dot"></div>
        <p>Juliana Almeida acabou de entrar no grupo</p>
      </aside>
    </main>

    <script src="script.js"></script>
  </body>
</html>
